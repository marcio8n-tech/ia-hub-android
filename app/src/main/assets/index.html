<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      text-align: center;
    }
    p.sub { color: #94a3b8; margin-bottom: 40px; text-align: center; font-size: 0.95rem; }
    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 400px;
      background: #1e1e2e;
      border: 1px solid #ffffff15;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:active { background: #2a2a3e; }
    .btn .icon { font-size: 2rem; }
    .btn .info { display: flex; flex-direction: column; }
    .btn .name { font-size: 1.1rem; font-weight: 700; }
    .btn .desc { font-size: 0.78rem; color: #94a3b8; margin-top: 3px; }
    footer { margin-top: auto; padding-top: 40px; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>🤖 IA Hub</h1>
  <p class="sub">Escolha uma IA pra usar agora</p>

  <a class="btn" href="https://gemini.google.com" target="_blank">
    <span class="icon">🟣</span>
    <span class="info">
      <span class="name">Google Gemini</span>
      <span class="desc">IA do Google — chat, imagens e muito mais</span>
    </span>
  </a>

  <a class="btn" href="https://copilot.microsoft.com" target="_blank">
    <span class="icon">🔷</span>
    <span class="info">
      <span class="name">Microsoft Copilot</span>
      <span class="desc">GPT-4 grátis com busca na web e imagens</span>
    </span>
  </a>

  <footer>IA Hub — Grátis e Open Source</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IA Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #080811;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 56px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    p.subtitle {
      color: #475569;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 340px;
      padding: 22px 24px;
      border-radius: 20px;
      text-decoration: none;
      color: #fff;
      margin-bottom: 18px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-gemini {
      background: linear-gradient(135deg, #1a0a2e, #0d1a3a);
      border: 1px solid #7c3aed55;
      box-shadow: 0 8px 30px #7c3aed22;
    }

    .btn-copilot {
      background: linear-gradient(135deg, #0a1628, #0a2040);
      border: 1px solid #2563eb55;
      box-shadow: 0 8px 30px #2563eb22;
    }

    .btn-icon {
      font-size: 2.6rem;
      flex-shrink: 0;
    }

    .btn-text .name {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .btn-text .desc {
      font-size: 0.78rem;
      color: #64748b;
    }

    .btn-arrow {
      margin-left: auto;
      font-size: 1.4rem;
      opacity: 0.4;
    }

    footer {
      margin-top: 50px;
      color: #1e293b;
      font-size: 0.72rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>IA Hub</h1>
    <p class="subtitle">Escolha sua IA favorita</p>
  </div>

  <a class="btn btn-gemini" href="https://gemini.google.com" target="_blank">
    <div class="btn-icon">🟣</div>
    <div class="btn-text">
      <div class="name">Google Gemini</div>
      <div class="desc">IA do Google — grátis com sua conta</div>
    </div>
    <div class="btn-arrow">›</div>
  </a>

  <a class="btn btn-copilot" href="https://copilot.microsoft.com" target="_blank">
    <div class="btn-icon">🔷</div>
    <div class="btn-text">
      <div class="name">Microsoft Copilot</div>
      <div class="desc">GPT-4 grátis + geração de imagens</div>
    </div>
    <div class="btn-arrow">›</div>
  </a>

  <footer>IA Hub</footer>

</body>
</html>
